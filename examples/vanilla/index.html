<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>chat-scroll-behavior vanilla example</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 24px;
      }

      #messages {
        border: 1px solid #d0d7de;
        height: 420px;
        overflow-y: auto;
        padding: 12px;
      }

      .message {
        border-bottom: 1px solid #eef1f4;
        padding: 12px 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Vanilla chat scroll</h1>
      <div id="messages"></div>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
